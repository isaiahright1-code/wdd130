<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us | White Water Rafting</title>
  <link rel="stylesheet" href="styles/rafting.css">
  <meta name="description"
    content="Learn more about our rafting company, our history, and the adventures we offer.">
  <meta name="author" content="Mubazi Isaiah">

</head>

<body>
  <header>

    <img src="images/z-crossedoars.jpg" alt="White Water Rafting Logo" class="logo">
    <nav>
      <a href="Home.html">Home</a>
      <a href="about.html" class="active">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>

  </header>

  <main>
    <!-- Hero Section -->
    <section class="hero">
      <img src="images/rafting47_600.jpg" alt="Rafting Adventure">
      <h1 class="hero-text">Experience the Thrill of Rafting!</h1>
    </section>

    <!-- Newsletter -->
    <section class="newsletter">
      <h2>Join Our Adventure Newsletter</h2>
      <form>
        <label for="name">Name:</label>
        <input type="text" id="name" required>
        <label for="email">Email:</label>
        <input type="email" id="email" required>
        <button type="submit">Sign Up</button>
      </form>
    </section>

    <!-- Call to Action -->
    <section class="cta">
      <p>Ready for the ride of your life??</p>

      <a href="trips.html" class="btn">View Our Trips</a>
    </section>

    <!-- Grid Layout -->
    <section class="grid">
      <div>
        <img src="images/rafting64_1024.jpg" alt="Rafting Rapids">
        <p>Unforgettable rapids and breathtaking scenery.</p>
      </div>
      <div>
        <img src="images/rafting47_600.jpg" alt="Rafting Team">
        <p>Team‑building adventures for all skill levels.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 White Water Rafting Co. | Mubazi Isaiah</p>
    <nav class="socialmedia">
      <a href="https://facebook.com"><img src="images/facebook_3128304.png" alt="Facebook"></a>
      <a href="https://twitter.com"><img src="images/twitter_3256013.png" alt="Twitter"></a>
      <a href="https://instagram.com"><img src="images/instagram_1384063.png" alt="Instagram"></a>
    </nav>
  </footer>
</body>

</html>
